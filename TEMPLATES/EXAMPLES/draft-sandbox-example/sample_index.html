<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Draft Onboarding Prototype</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f7f7f7; }
    .phone { max-width: 390px; min-height: 760px; margin: 24px auto; background: white; border-radius: 32px; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,.12); }
    .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #ffe8e8; color: #b40000; font-size: 12px; font-weight: 700; }
    h1 { font-size: 34px; line-height: 1.05; margin: 32px 0 12px; }
    p { color: #555; line-height: 1.45; }
    .hero { height: 260px; border-radius: 28px; background: linear-gradient(135deg, #e60000, #ff7a59); margin: 24px 0; }
    button { width: 100%; border: 0; background: #e60000; color: white; padding: 16px; border-radius: 18px; font-weight: 800; }
  </style>
</head>
<body>
  <main class="phone">
    <span class="badge">DRAFT — not production UI</span>
    <div class="hero"></div>
    <h1>Capture more with every run.</h1>
    <p>This throwaway HTML sandbox explores hierarchy and spacing only. It should be promoted to Figma or a screen spec before implementation.</p>
    <button>Start exploring</button>
  </main>
</body>
</html>
