context_backend:
  enabled: false
  mode: file_only # file_only | qdrant | supabase | hybrid
  canonical_source: project-control-github
  project_id: "REPLACE_WITH_PROJECT_SLUG"

qdrant:
  collection: "appforge_REPLACE_WITH_PROJECT_SLUG_memory"
  url_env: QDRANT_URL
  api_key_env: QDRANT_API_KEY
  vector_size: 384
  distance: Cosine

embedding:
  provider: hash_dev # hash_dev | openai | local | custom
  model: "example-only"
  dimension: 384
  openai_model_example: "text-embedding-3-small"
  local_model_examples:
    - all-MiniLM-L6-v2
    - bge-small-en

indexing:
  include_drafts: false
  include_raw_code: false
  include_code_summaries: true
  excluded_globs:
    - "**/.env*"
    - "**/*secret*"
    - "**/*token*"
    - "**/node_modules/**"
    - "**/build/**"
    - "**/dist/**"
    - "**/local-only/debug/**"
