services:
  appforge-postgres:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${APPFORGER_POSTGRES_DB:-appforge}
      POSTGRES_USER: ${APPFORGER_POSTGRES_USER:-appforge}
      POSTGRES_PASSWORD: ${APPFORGER_POSTGRES_PASSWORD:-appforge}
    ports:
      - "${APPFORGER_POSTGRES_PORT:-55432}:5432"
    volumes:
      - appforge_postgres_data:/var/lib/postgresql/data

  appforge-qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant"]
    ports:
      - "${APPFORGER_QDRANT_PORT:-6333}:6333"
    volumes:
      - appforge_qdrant_data:/qdrant/storage

  appforge-neo4j:
    image: neo4j:5
    profiles: ["neo4j"]
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-appforge-change-me}
    ports:
      - "${APPFORGER_NEO4J_HTTP_PORT:-7474}:7474"
      - "${APPFORGER_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - appforge_neo4j_data:/data

volumes:
  appforge_postgres_data:
  appforge_qdrant_data:
  appforge_neo4j_data:
