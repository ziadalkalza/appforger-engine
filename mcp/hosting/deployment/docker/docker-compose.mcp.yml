services:
  appforger-mcp:
    build:
      context: ../../..
      dockerfile: appforge-engine/mcp/hosting/deployment/docker/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../env/mcp.env.example
    environment:
      APPFORGE_MCP_EXECUTION_MODE: guide_only
      APPFORGE_MCP_ALLOW_PROJECT_EXECUTION: "false"
